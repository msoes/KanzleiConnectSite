{{ define "main" }}
<div class="glass" style="max-width: 1000px; margin: 2rem auto; padding: 2rem; text-align: center;">
  <h1 style="margin-top: 0;">{{ .Title }}</h1>
  <p>{{ .Params.description }}</p>
  
  {{ if .Params.photos }}
  <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem;">
    {{ range .Params.photos }}
      <a href="{{ . }}" target="_blank" style="display: block; overflow: hidden; border-radius: 8px;">
        <img src="{{ . }}" alt="Gallery Image" style="width: 100%; height: 200px; object-fit: cover; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
      </a>
    {{ end }}
  </div>
  {{ else if .Params.image }}
  <img src="{{ .Params.image }}" alt="{{ .Title }}" style="max-width: 100%; border-radius: 8px; margin-bottom: 1rem;">
  {{ end }}

  <div class="content" style="margin-top: 2rem;">
    {{ .Content }}
  </div>
  <a href="/gallery/" class="btn" style="margin-top: 2rem;">Zurück zur Galerie</a>
</div>
{{ end }}
